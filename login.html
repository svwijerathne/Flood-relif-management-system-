<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Login - Faculty of Applied Sciences</title>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>

    <div class="login-container">
        <div class="heading">Flood Relif Management System</div>

        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" name="email" placeholder="Username" required>
            </div>

            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" id="password" name="pw" placeholder="Password" required>
                <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>

        
            <div id="errorMessage" style="color: red; font-size: 13px; margin-bottom: 10px; text-align: center; font-weight: bold;"></div>

            <button type="submit" class="btn-login">Log in</button>
    
    
<div class="guest-section">
    <a href="index.html" style="text-decoration: none;">
        <button type="button" class="btn-guest">Log in as a guest</button>
    </a>
</div>
<br>
    <div style="text-align: center; margin-top: 15px;">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    </div>

    <div class="image-container"></div>

    <script src="login.js"></script>
</body>
</html>
