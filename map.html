<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FloodRelief - Map Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles_map.css">
</head>

<body id="body" class="lightMode">

    <div class="sidebar">
        <div class="logo-box">

            <h2> <i class="fa-solid fa-hand-holding-heart protection-icon"></i> FLOOD RELIEF</h2>
        </div>
        <ul>
            <ul>
                <li><a href="admin_page.html"> Dashboard</a></li>
                <li><a href="map.html"> Map Control</a></li>
            </ul>
            <div class="mode-toggle" onclick="toggleMode()">
                <i id="mode-icon" class="bi bi-moon-stars-fill"></i>
            </div>
    </div>

    <div class="main-content">
        <div class="map-header">
            <h1>Live Relief Distribution & Severity Map</h1>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Define Map Tile Layers
        const lightTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CartoDB'
        });

        // 2. Initialize Map with light layer by default
        const map = L.map('map', {
            zoomControl: false,
            layers: [lightTiles]
        }).setView([7.8731, 80.7718], 7.5);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        function getColor(severity) {
            const s = severity ? severity.toLowerCase() : 'low';
            if (s === 'high') return '#e74c3c';
            if (s === 'medium') return '#e67e22';
            return '#2ecc71';
        }

        // 3. Fetch Data and Draw GeoJSON
        Promise.all([
            fetch('map.php').then(res => res.json()),
            fetch('geoBoundaries-LKA-ADM2.geojson').then(res => res.json())
        ]).then(([stats, geoData]) => {
            L.geoJson(geoData, {
                style: (feature) => {
                    const dName = feature.properties.shapeName.replace(" District", "").trim();
                    const data = stats[dName] || { severity: 'low' };
                    return { fillColor: getColor(data.severity), weight: 1.5, color: 'white', fillOpacity: 0.7 };
                },
                onEachFeature: (feature, layer) => {
                    layer.on('mouseover', (e) => {
                        const dName = feature.properties.shapeName.replace(" District", "").trim();
                        const data = stats[dName] || { sent: 0, total: 0, severity: 'low' };

                        layer.bindTooltip(`
                            <div style="text-align:center;">
                                <strong style="font-size:1.1em;">${dName}</strong><br>
                                <span style="color:${getColor(data.severity)}; font-weight:bold;">
                                    ${data.severity.toUpperCase()} SEVERITY
                                </span><br>
                                Delivered: ${data.sent}<br>
                                Total Requests: ${data.total}
                            </div>
                        `, { sticky: true }).openTooltip();

                        e.target.setStyle({ fillOpacity: 0.9, weight: 3 });
                    });
                    layer.on('mouseout', (e) => e.target.setStyle({ fillOpacity: 0.7, weight: 1.5 }));
                }
            }).addTo(map);
        });

        // 4. Mode Toggle Logic (Sidebar + Map Tiles)
        function toggleMode() {
            const body = document.getElementById("body");
            const icon = document.getElementById("mode-icon");

            if (body.classList.contains("lightMode")) {
                // Switch to Dark
                body.classList.replace("lightMode", "darkMode");
                icon.className = "bi bi-sun-fill";
                map.removeLayer(lightTiles);
                map.addLayer(darkTiles);
            } else {
                // Switch to Light
                body.classList.replace("darkMode", "lightMode");
                icon.className = "bi bi-moon-stars-fill";
                map.removeLayer(darkTiles);
                map.addLayer(lightTiles);
            }
        }
    </script>
</body>

</html>
