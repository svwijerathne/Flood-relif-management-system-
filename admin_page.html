<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FloodRelief System - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="stylesAdmin.css">
</head>
<body class="lightMode" id="body">

    <div class="sidebar">
        <div class="logo-box">
            <i class="fa-solid fa-hand-holding-heart protection-icon"></i>
            <span class="brand-flood">FLOOD </span><span class="brand-relief">RELIEF</span>
                </div>
        <ul>
            <li><a href="admin_page.html">Dashboard</a></li>
            <li><a href="map.html">Map Control</a></li>
            <li style="margin-top: 50px;">
                <a href="login.html" style="color: #ff6b6b;">Logout</a>
            </li>
        </ul>
        <button class="mode-toggle" onclick="displayMode()">
            <i id="mode-icon" class="bi-moon-stars-fill"></i>
        </button>
    </div>

    <div class="main-content">
        <div class="stats-container">
            <div class="stat-card"><h3>Total Requests</h3><p id="totalCount">0</p></div>
            <div class="stat-card" style="border-bottom: 4px solid #f39c12;"><h3>Pending</h3><p id="pendingCount">0</p></div>
            <div class="stat-card" style="border-bottom: 4px solid #2ecc71;"><h3>Approved</h3><p id="approvedCount">0</p></div>
            <div class="stat-card" style="border-bottom: 4px solid #e74c3c;">
                <h3>Rejected</h3><p id="rejectedCount">0</p>
            </div>
        </div>

        <h2>Manage Aid Requests</h2>
        <table>
            <thead>
                <tr>
                    <th>Request ID</th>
                    <th>Requested Date</th>
                    <th>Name</th>
                    <th>Aid Type</th>
                    <th>Divisional Secretariat</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="requestsTableBody"></tbody>
        </table>
    </div>
    <script src="admin.js"></script>
    <script>
    function displayMode() {
        const element = document.getElementById("body");
    const icon = document.getElementById("mode-icon");

    if (element.classList.contains("lightMode")) {
        // Switch to Dark Mode
        element.classList.replace("lightMode", "darkMode");
        // Swap icon: Sun -> Moon
        icon.classList.replace("bi-moon-stars-fill","bi-sun-fill" );
    } else {
        // Switch to Light Mode
        element.classList.replace("darkMode", "lightMode");
        // Swap icon: Moon -> Sun
        icon.classList.replace("bi-sun-fill", "bi-moon-stars-fill");
    }
}
    </script>
</body>
</html>
